<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maxi Sorpresa</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #1a1a1a;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        h1 { color: #f1c40f; margin: 10px 0; text-shadow: 2px 2px #000; font-size: 1.8rem; }

        #game-container {
            position: relative;
            width: 95vw;
            height: 80vh;
            background: #fff;
            border: 8px solid #f1c40f;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        #prize-area {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #ffffff;
        }

        .prize-text {
            position: absolute;
            font-size: 28px;
            font-weight: bold;
            color: #d63031;
            white-space: nowrap;
            user-select: none;
            pointer-events: none;
        }

        #scratch-canvas {
            position: absolute;
            top: 0;
            left: 0;
            touch-action: none;
            cursor: crosshair;
        }

        .controls { margin-top: 15px; }
        .btn {
            padding: 12px 30px;
            background: #f1c40f;
            color: #000;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <h1>✨ GRATTA E SCOPRI ✨</h1>

    <div id="game-container">
        <div id="prize-area"></div>
        <canvas id="scratch-canvas"></canvas>
    </div>

    <div class="controls">
        <button class="btn" onclick="init()">Nuovo Biglietto</button>
    </div>

    <script>
        const canvas = document.getElementById('scratch-canvas');
        const container = document.getElementById('game-container');
        const prizeArea = document.getElementById('prize-area');
        const ctx = canvas.getContext('2d');

        const messaggi = [
            "HAI VINTO! ", "TI AMO! 💕", "SEI STUPENDA", 
            "NUH UH", "TI VOGLIO BENE ❤️", "QUACK",
            "MI DEVI UNA PIZZA", "CUTIE", "DISCORD"
        ];

        function init() {
            canvas.width = container.offsetWidth;
            canvas.height = container.offsetHeight;

            prizeArea.innerHTML = ''; 
            messaggi.forEach(testo => {
                const div = document.createElement('div');
                div.className = 'prize-text';
                div.innerText = testo;
                const posX = Math.random() * (canvas.width - 280) + 20;
                const posY = Math.random() * (canvas.height - 60) + 20;
                div.style.left = posX + 'px';
                div.style.top = posY + 'px';
                div.style.transform = `rotate(${(Math.random() - 0.5) * 25}deg)`;
                prizeArea.appendChild(div);
            });

            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = '#a0a0a0'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Texture sporca densa
            for (let i = 0; i < 3500; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? '#808080' : '#c0c0c0';
                ctx.fillRect(Math.random() * canvas.width, Math.random() * canvas.height, Math.random()*3, Math.random()*3);
            }

            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.font = 'bold 50px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('GRATTA TUTTO', canvas.width/2, canvas.height/2);
        }

        let drawing = false;
        function scratch(e) {
            if (!drawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
            const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(x, y, 45, 0, Math.PI * 2); 
            ctx.fill();
        }

        canvas.addEventListener('mousedown', () => drawing = true);
        window.addEventListener('mouseup', () => drawing = false);
        canvas.addEventListener('mousemove', scratch);
        canvas.addEventListener('touchstart', (e) => { drawing = true; scratch(e); });
        canvas.addEventListener('touchend', () => drawing = false);
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); scratch(e); });

        window.onload = init;
    </script>
</body>
</html>
